x-backend-common: &backend-common
  image: cat-schedule-backend:dev
  build:
    context: ./backend
  env_file:
    - .env

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  migrate:
    <<: *backend-common
    depends_on:
      db:
        condition: service_healthy
    command: ["sh", "-c", "alembic upgrade head"]

  api:
    <<: *backend-common
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]

  worker:
    <<: *backend-common
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    command: ["rq", "worker", "cat_schedule"]

  scheduler:
    <<: *backend-common
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    command: ["cat-schedule-scheduler"]

  web:
    build:
      context: ./web
      args:
        VITE_TERM_START_DATES: ${VITE_TERM_START_DATES:-}
        VITE_DEFAULT_TERM_START_DATE: ${VITE_DEFAULT_TERM_START_DATE:-}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    ports:
      - "5173:80"

volumes:
  postgres-data:
